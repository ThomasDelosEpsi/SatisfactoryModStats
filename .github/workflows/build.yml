# =============================================================================
# FactoryMonitor — Pipeline de build Satisfactory Mod
#
# POURQUOI UN SELF-HOSTED RUNNER ?
# ─────────────────────────────────────────────────────────────────────────────
# Compiler un mod Satisfactory est impossible sur les runners GitHub (ubuntu-
# latest / windows-latest) pour deux raisons structurelles :
#
#   1. ESPACE DISQUE : Unreal Engine 5.3 + headers CSS = ~60–80 GB.
#      Les runners GitHub proposent ~14 GB — insuffisant.
#
#   2. LICENCES : Les binaires UE et le code source Satisfactory (CSS)
#      sont sous accord Epic Games/Coffee Stain. Ils ne peuvent pas être
#      téléchargés automatiquement sans authentification, et l'image Docker
#      ghcr.io/satisfactorymodding/unreal-engine est privée.
#
# SOLUTION : Self-Hosted Runner sur ta machine de développement Windows.
# Ta machine a déjà UE 5.3 + Satisfactory + Alpakit installés — le runner
# GitHub Actions s'exécute dessus comme un service léger (~150 MB) et
# GitHub lui envoie les jobs à la demande.
#
# SETUP DU RUNNER (5 minutes) :
#   1. GitHub → Settings → Actions → Runners → "New self-hosted runner"
#   2. Sélectionne Windows, copie et exécute les commandes affichées
#   3. Lors de la configuration, ajoute le label "satisfactory" :
#      > Enter any additional labels (e.g. 'gpu,x64'): satisfactory
#   4. Lance le runner en service Windows :
#      > run.cmd  (ou installe-le comme service avec svc.cmd install)
#
# VARIABLES À CONFIGURER (Settings → Secrets and variables → Variables) :
#   UE_ROOT        Chemin vers UE 5.3, ex: C:\Program Files\Epic Games\UE_5.3
#   SF_PROJ        Chemin vers FactoryGame.uproject, ex:
#                  C:\...\SatisfactoryEarlyAccess\FactoryGame.uproject
#   MOD_OUTPUT     Dossier de sortie du .smod, ex: C:\ModBuilds
# =============================================================================

name: 🏭 Build FactoryMonitor Mod

on:
  push:
    branches: [main]
  workflow_dispatch:   # Déclenchement manuel depuis l'onglet Actions

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1 — Validation rapide (runner GitHub standard, gratuit)
  # Vérifie la structure du projet AVANT de lancer la compilation lourde.
  # Feedback en ~20 secondes sans consommer de temps sur le runner dédié.
  # ---------------------------------------------------------------------------
  validate:
    name: ✅ Validate project structure
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔍 Validate FactoryMonitor.uplugin (JSON)
        run: |
          echo "→ Vérification de la syntaxe JSON du .uplugin..."
          python3 -c "
          import json, sys, glob

          uplugins = glob.glob('**/*.uplugin', recursive=True)
          if not uplugins:
              print('ERREUR : Aucun fichier .uplugin trouvé.', file=sys.stderr)
              sys.exit(1)

          for path in uplugins:
              with open(path) as f:
                  data = json.load(f)
              # Vérifie les champs obligatoires pour SML
              for field in ['FileVersion', 'Version', 'VersionName', 'Modules']:
                  if field not in data:
                      print(f'ERREUR : Champ manquant \"{field}\" dans {path}', file=sys.stderr)
                      sys.exit(1)
              print(f'✅ {path} — OK (v{data[\"VersionName\"]})')
          "

      - name: 🔍 Validate workflow YAML
        run: |
          echo "→ Vérification de la syntaxe YAML des workflows..."
          python3 -c "
          import yaml, glob, sys
          for path in glob.glob('.github/workflows/*.yml'):
              with open(path) as f:
                  yaml.safe_load(f)
              print(f'✅ {path} — OK')
          "

      - name: 🔍 Check required source files
        run: |
          echo "→ Vérification de la présence des fichiers C++ requis..."
          MISSING=0
          for f in \
            "FactoryMonitor/Source/FactoryMonitor/Public/FactoryMonitorSubsystem.h" \
            "FactoryMonitor/Source/FactoryMonitor/Private/FactoryMonitorSubsystem.cpp" \
            "FactoryMonitor/Source/FactoryMonitor/FactoryMonitor.Build.cs"; do
            if [ -f "$f" ]; then
              echo "✅ $f"
            else
              echo "❌ MANQUANT : $f"
              MISSING=1
            fi
          done
          exit $MISSING

  # ---------------------------------------------------------------------------
  # JOB 2 — Compilation réelle (self-hosted runner Windows)
  # Dépend du job validate : si la validation échoue, le build ne démarre pas.
  # Utilise Alpakit en mode headless via RunUAT pour produire le .smod.
  # ---------------------------------------------------------------------------
  build:
    name: 🔨 Compile & Package .smod
    needs: validate          # Attend la réussite de la validation
    runs-on: [self-hosted, Windows, satisfactory]

    timeout-minutes: 60      # Coupe le job si Alpakit se bloque

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── Compilation du plugin C++ + packaging .smod via Alpakit ────────────
      # RunUAT invoque le script Alpakit.Automation qui :
      #   1. Compile le plugin en mode Shipping via UnrealBuildTool
      #   2. Copie les binaires et les assets dans un dossier staging
      #   3. Crée le fichier .smod (ZIP structuré selon la spec SML)
      #
      # Variables à définir dans Settings → Variables (pas Secrets) :
      #   UE_ROOT  = chemin vers le dossier d'UE 5.3
      #   SF_PROJ  = chemin complet vers FactoryGame.uproject
      #   MOD_OUT  = dossier de sortie pour le .smod
      - name: 🔧 Build with Alpakit (RunUAT)
        shell: pwsh
        env:
          UE_ROOT:    ${{ vars.UE_ROOT }}
          SF_PROJ:    ${{ vars.SF_PROJ }}
          MOD_OUTPUT: ${{ vars.MOD_OUTPUT }}
        run: |
          # ── Chemins ──────────────────────────────────────────────────────
          $RunUAT    = Join-Path $env:UE_ROOT "Engine\Build\BatchFiles\RunUAT.bat"
          $PluginDir = Join-Path $env:GITHUB_WORKSPACE "FactoryMonitor"
          $OutDir    = $env:MOD_OUTPUT

          # ── Validation des prérequis ──────────────────────────────────────
          if (-not (Test-Path $RunUAT)) {
            Write-Error "RunUAT introuvable : $RunUAT`nVérifie la variable UE_ROOT."
            exit 1
          }
          if (-not (Test-Path $env:SF_PROJ)) {
            Write-Error "FactoryGame.uproject introuvable : $env:SF_PROJ`nVérifie SF_PROJ."
            exit 1
          }

          # ── Nettoyage du dossier de sortie ────────────────────────────────
          if (Test-Path $OutDir) { Remove-Item $OutDir -Recurse -Force }
          New-Item -ItemType Directory -Path $OutDir | Out-Null

          # ── Lancement d'Alpakit via RunUAT ────────────────────────────────
          # -ScriptsForProject : indique à UAT où chercher les scripts custom
          # Alpakit             : nom du script d'automatisation
          # -project            : le .uproject Satisfactory (fournit les deps)
          # -mods               : nom de référence du mod (= nom du .uplugin)
          # -output             : dossier de destination du .smod
          Write-Host "→ Lancement de la compilation Alpakit..."
          & $RunUAT `
            -ScriptsForProject="$env:SF_PROJ" `
            Alpakit `
            -project="$env:SF_PROJ" `
            -mods="FactoryMonitor" `
            -output="$OutDir" `
            -nocompileeditor

          # ── Vérification du résultat ──────────────────────────────────────
          $smod = Get-ChildItem $OutDir -Filter "*.smod" -Recurse | Select-Object -First 1
          if (-not $smod) {
            Write-Error "Aucun .smod trouvé dans $OutDir après le build."
            exit 1
          }
          Write-Host "✅ Build réussi : $($smod.FullName)"

          # Expose le chemin au job suivant via GITHUB_OUTPUT
          echo "SMOD_PATH=$($smod.FullName)" >> $env:GITHUB_OUTPUT

      # ── Upload de l'artefact .smod ─────────────────────────────────────────
      - name: 📦 Upload artefact .smod
        uses: actions/upload-artifact@v4
        with:
          name: FactoryMonitor-${{ github.ref_name }}-${{ github.sha }}
          path: ${{ vars.MOD_OUTPUT }}/*.smod
          if-no-files-found: error
          retention-days: 30

      # ── Résumé affiché dans l'onglet Actions ───────────────────────────────
      - name: 📋 Résumé du build
        if: success()
        shell: pwsh
        run: |
          @"
          ## ✅ Build réussi

          | Champ         | Valeur |
          |---|---|
          | Mod           | FactoryMonitor |
          | Commit        | ``${{ github.sha }}`` |
          | Branche       | ``${{ github.ref_name }}`` |
          | Déclenché par | ${{ github.actor }} |

          Le fichier ``.smod`` est disponible dans la section **Artifacts** ci-dessus.
          "@ >> $env:GITHUB_STEP_SUMMARY
