# =============================================================================
# FactoryMonitor — Pipeline de build automatique
#
# Ce workflow compile le mod Satisfactory et produit un artefact .smod
# téléchargeable depuis l'onglet "Actions" de GitHub.
#
# PRÉREQUIS — GitHub Secrets à configurer dans :
#   Settings → Secrets and variables → Actions → New repository secret
#
#   SECRET                  DESCRIPTION
#   ──────────────────────────────────────────────────────────────────
#   EPIC_GAMES_EMAIL        Adresse e-mail de ton compte Epic Games
#   EPIC_GAMES_PASSWORD     Mot de passe de ton compte Epic Games
#
# Ces identifiants permettent au runner de télécharger les binaires
# pré-compilés d'Unreal Engine 5.3 depuis l'image Docker de la
# communauté SML (ghcr.io/satisfactorymodding/unreal-engine:5.3).
# Ils ne sont jamais exposés dans les logs ni dans les artefacts.
#
# ARCHITECTURE DE BUILD :
#   Le runner tire l'image Docker officielle SML qui embarque UE 5.3,
#   les headers CSS (Content Satisfactory Source), et l'outil Alpakit
#   en mode headless. La compilation produit un fichier .smod signé.
# =============================================================================

name: 🏭 Build FactoryMonitor Mod

on:
  push:
    branches:
      - main
    # ⚠️  PAS de filtre "paths:" ici.
    # Un filtre paths: ignore les commits qui ne modifient aucun fichier
    # listé (y compris les commits vides créés avec --allow-empty).
    # Pour limiter les builds aux vraies modifications de code, réactivez
    # ce filtre une fois que le pipeline fonctionne correctement.

  # Permet de déclencher le build manuellement depuis l'onglet Actions.
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Job unique : compilation + packaging du .smod
  # ---------------------------------------------------------------------------
  build:
    name: Compile & Package .smod
    runs-on: ubuntu-latest

    # Timeout de sécurité : si le build dépasse 90 min (image Docker UE lourde),
    # le job est annulé pour éviter une consommation excessive de minutes.
    timeout-minutes: 90

    steps:
      # ── 1. Checkout du code source ─────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Build via l'image Docker officielle SML ─────────────────────────
      #
      # POURQUOI DOCKER ?
      #   Compiler un mod Satisfactory nécessite Unreal Engine 5.3 complet +
      #   les headers CSS (Content Satisfactory Source). L'équipe SML maintient
      #   une image Docker pré-compilée (~50 GB) sur ghcr.io qui embarque tout
      #   le nécessaire, y compris Alpakit en mode headless.
      #   C'est l'approche recommandée et documentée par la communauté SML
      #   pour les pipelines CI sans runner self-hosted.
      #
      # STRUCTURE DU VOLUME :
      #   Le runner monte le plugin (ce dépôt) dans le répertoire Mods/ du
      #   projet Satisfactory à l'intérieur du conteneur, là où Alpakit
      #   s'attend à le trouver pour le packaging.
      #
      # RÉSULTAT :
      #   Alpakit produit un fichier FactoryMonitor.smod dans le dossier
      #   Saved/ArchivedPlugins/ du projet. L'étape suivante le récupère.
      # ──────────────────────────────────────────────────────────────────────
      - name: 🔨 Build mod (Alpakit headless — Docker SML UE 5.3)
        run: |
          docker run --rm \
            --volume "${{ github.workspace }}:/game/Mods/FactoryMonitor" \
            --env EPIC_EMAIL="${{ secrets.EPIC_GAMES_EMAIL }}" \
            --env EPIC_PASSWORD="${{ secrets.EPIC_GAMES_PASSWORD }}" \
            ghcr.io/satisfactorymodding/unreal-engine:5.3 \
            package FactoryMonitor

      # ── 3. Upload de l'artefact .smod ──────────────────────────────────────
      #
      # Le fichier .smod produit par Alpakit est sauvegardé comme artefact
      # de workflow. Il est téléchargeable depuis :
      #   GitHub → Actions → Dernier run → Section "Artifacts"
      # pendant 30 jours (durée par défaut, configurable ci-dessous).
      # ──────────────────────────────────────────────────────────────────────
      - name: 📦 Upload artefact .smod
        uses: actions/upload-artifact@v4
        # Cette étape s'exécute même si le build échoue (utile pour
        # inspecter les fichiers partiels en cas d'erreur de packaging).
        if: always()
        with:
          # Nom de l'artefact visible dans l'interface GitHub Actions.
          name: FactoryMonitor-${{ github.sha }}
          # Recherche récursive du .smod produit par Alpakit.
          # L'action place généralement le fichier dans le répertoire
          # du plugin ou dans un dossier "dist/".
          path: |
            **/*.smod
            **/Saved/ArchivedPlugins/**/*.smod
          # Échoue si aucun .smod n'est trouvé — signal d'échec de build clair.
          if-no-files-found: error
          # Durée de conservation de l'artefact en jours (max: 90).
          retention-days: 30

      # ── 4. Résumé du build ─────────────────────────────────────────────────
      # Affiche un récapitulatif dans l'interface GitHub Actions.
      - name: 📋 Résumé du build
        if: success()
        run: |
          echo "## ✅ Build réussi" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Champ        | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Mod          | FactoryMonitor |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit       | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branche      | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Déclenché par| ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Le fichier \`.smod\` est disponible dans la section **Artifacts** ci-dessus." >> $GITHUB_STEP_SUMMARY
